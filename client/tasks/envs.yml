- name: set system $PAGER
  lineinfile:
    line: PAGER='lv -c'
    path: /etc/environment
- name: set $ZDOTDIR
  lineinfile:
    path: /etc/zsh/zshenv
    line: export ZDOTDIR=$HOME/.config/zsh
- name: set $XDG_CONFIG_HOME
  lineinfile:
    line: XDG_CONFIG_HOME="$HOME/.config"
    path: /etc/environment
- name: set $XDG_CACHE_HOME
  lineinfile:
    line: XDG_CACHE_HOME="$HOME/.cache"
    path: /etc/environment
- name: set $XDG_DATA_HOME
  lineinfile:
    line: XDG_DATA_HOME="$HOME/.local/share"
    path: /etc/environment
- name: set $XDG_STATE_HOME
  lineinfile:
    line: XDG_STATE_HOME="$HOME/.local/state"
    path: /etc/environment
